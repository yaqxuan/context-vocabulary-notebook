name: Android APK

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor project
        run: npm run android:sync

      - name: Test and build debug APK
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug lintDebug

      - name: Create debug checksum
        run: sha256sum android/app/build/outputs/apk/debug/app-debug.apk > android/app/build/outputs/apk/debug/app-debug.apk.sha256

      - name: Upload test APK
        uses: actions/upload-artifact@v7
        with:
          name: cvn-android-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk.sha256
          retention-days: 14

      - name: Check signing secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "HAS_ANDROID_SIGNING=true" >> "$GITHUB_ENV"
          else
            echo "Signing secrets are incomplete; skipping the public GitHub Release."
          fi

      - name: Decode release keystore
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare signed release files
        if: env.HAS_ANDROID_SIGNING == 'true'
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk context-vocabulary-notebook-${GITHUB_REF_NAME}.apk
          sha256sum context-vocabulary-notebook-${GITHUB_REF_NAME}.apk > context-vocabulary-notebook-${GITHUB_REF_NAME}.apk.sha256

      - name: Publish GitHub Release
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" context-vocabulary-notebook-${GITHUB_REF_NAME}.apk context-vocabulary-notebook-${GITHUB_REF_NAME}.apk.sha256 --verify-tag --generate-notes

  emulator:
    name: Install on API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        api-level: [24, 36]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies and build APK
        run: |
          npm ci
          npm run android:sync
          cd android
          ./gradlew assembleDebug

      - name: Install and launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n io.github.yaqxuan.contextvocabularynotebook/.MainActivity
            sleep 3
            test -n "$(adb shell pidof io.github.yaqxuan.contextvocabularynotebook)"
