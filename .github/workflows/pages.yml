name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/demo/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site/assets/screenshots
          cp -a site/. _site/
          cp docs/demo/01-create-card-en.png _site/assets/screenshots/create-card-en.png
          cp docs/demo/01-create-card-zh.png _site/assets/screenshots/create-card-zh.png
          cp docs/demo/03-review.png _site/assets/screenshots/review.png
          cp docs/demo/04-statistics.png _site/assets/screenshots/statistics.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
