name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Bash installer syntax
        if: runner.os == 'Linux'
        run: bash -n scripts/install.sh scripts/install-recognition.sh scripts/smoke-install.sh

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem scripts -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref] $tokens,
              [ref] $parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $failed = $true
              $parseErrors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Verify translated READMEs
        run: npm run readme:i18n:check

      - name: Verify documentation links
        run: npm run docs:links:check

      - name: Type-check
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm test

      - name: Build production assets
        run: npm run build

  e2e:
    name: Browser tests (Ubuntu)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
