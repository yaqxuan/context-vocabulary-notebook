name: Bug report
description: Report a reproducible problem with Context Vocabulary Notebook.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the project. Remove private vocabulary,
        media, API keys, and paths before attaching screenshots or logs.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find the same problem.
          required: true
        - label: I removed private data and secrets from this report.
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, WSL, Linux, macOS, Other]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0-alpha or a commit SHA
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant logs or screenshots
      description: Paste short logs or drag in sanitized screenshots. Do not include API keys.
