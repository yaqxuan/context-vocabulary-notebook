<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phase 8A Homepage Local Greeting Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-950">
  <main class="mx-auto max-w-5xl p-8">
    <section class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
      <div class="mb-6">
        <p class="text-sm font-medium text-slate-500">首页</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950">早上好，今天刚刚开始。</h1>
        <p class="mt-2 text-sm text-slate-500">问候语按本地时间段选择；不显示时间段标签；文案模块暂不显示。</p>
      </div>

      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-sm text-slate-500">今日待复习</p>
          <p class="mt-2 text-3xl font-bold text-slate-950">3</p>
          <p class="mt-1 text-sm text-slate-600">按 FSRS 到期排序</p>
        </div>
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-sm text-slate-500">今日已复习</p>
          <p class="mt-2 text-3xl font-bold text-slate-950">5 / 20</p>
          <p class="mt-1 text-sm text-slate-600">每日目标是提醒，不是硬限制</p>
        </div>
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-sm text-slate-500">Again</p>
          <p class="mt-2 text-3xl font-bold text-slate-950">1</p>
          <p class="mt-1 text-sm text-slate-600">今天不熟或答错</p>
        </div>
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-sm text-slate-500">Good</p>
          <p class="mt-2 text-3xl font-bold text-slate-950">4</p>
          <p class="mt-1 text-sm text-slate-600">今天顺利想起</p>
        </div>
      </div>

      <div class="mt-6 rounded-2xl border border-blue-100 bg-blue-50 p-5">
        <p class="text-sm font-medium text-blue-800">今天可以继续积累和复习</p>
        <p class="mt-1 text-sm text-blue-700">复习页会按到期时间展示词义条目，目标单词不会被隐藏。</p>
      </div>

      <div class="mt-6 flex flex-wrap gap-3">
        <a class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700" href="#/review">开始复习</a>
        <a class="inline-flex items-center justify-center rounded-lg bg-white px-4 py-2 text-sm font-medium text-slate-800 ring-1 ring-slate-300 transition hover:bg-slate-50" href="#/create">快速制卡</a>
      </div>
    </section>
  </main>
</body>
</html>
